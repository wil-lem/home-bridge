server {
    listen 80;
    server_name home-bridge.local;
    
    # Root directory set to /app
    root /app/app/public;
    index index.php index.html;

    # Handle requests for static files or pass to index.php
    # Most frameworks handle this via .htaccess when in Apache
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Process PHP files - this part is essential
    location ~ \.php$ {
        fastcgi_pass home_bridge_php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Not typically needed if your app uses a standard directory structure
    # location /public {
    #     try_files $uri $uri/ /public/index.php?$query_string;
    # }

    # Basic security - could be considered optional if you're not concerned about security
    location ~ /\. {
        deny all;
    }

    # Typically handled by the framework or unnecessary in dev environments
    # location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp)$ {
    #     expires 30d;
    #     access_log off;
    #     add_header Cache-Control "public";
    # }

    # Typically handled by the framework or unnecessary in dev environments
    # location ~* \.(env|log|yml|yaml|json|lock|md|sql|conf)$ {
    #     deny all;
    # }
}