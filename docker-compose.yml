version: '3'

services:
  # PHP service
  home_bridge_php:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}

    container_name: home_bridge_php
    restart: always
    volumes:
      - ./:/app
      - ./docker/mysql.cnf:/etc/my.cnf
    networks:
      - traefik-network
    user: ${USER_ID:-1000}:${GROUP_ID:-1000}
    depends_on:
      - redis

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: home_bridge_redis
    restart: always
    networks:
      - traefik-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # Web server (Nginx)
  home_bridge_nginx:
    image: nginx:latest
    container_name: home_bridge_nginx
    restart: always
    ports:
      - "8383:80"
    volumes:
      - ./:/app:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-network
    depends_on:
      - home_bridge_php
networks:
  traefik-network:
    external: true

volumes:
  redis-data:
    driver: local
